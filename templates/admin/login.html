<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NEPAL's Stories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff6b35;
            --dark-bg: #1a1a1a;
        }

        body {
            background: #f8f9fa url("https://www.transparenttextures.com/patterns/cubes.png");
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .login-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .login-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            padding: 50px 30px;
            text-align: center;
            color: white;
            position: relative;
        }

        .login-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-orange);
        }

        .login-body {
            padding: 40px;
        }

        .form-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #666;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid #eef0f2;
            background-color: #fcfdfe;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
            border-color: var(--primary-orange);
            background-color: #fff;
        }

        .btn-primary {
            background-color: var(--primary-orange);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: #e55a2b;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.2);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .alert {
            border-radius: 12px;
            font-size: 0.85rem;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="login-card" data-aos="fade-up">
        <div class="login-header">
            <div class="brand-icon">
                <i class="fas fa-mountain fa-2x" style="color: var(--primary-orange);"></i>
            </div>
            <h3 class="fw-bold mb-1">Admin Access</h3>
            <p class="text-white-50 small mb-0">Nepal's Stories Management Portal</p>
        </div>
        <div class="login-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div
                class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show mb-4 shadow-sm border-start border-4 border-{{ 'danger' if category == 'error' else category }}">
                <i class="fas {{ 'fa-exclamation-circle' if category == 'error' else 'fa-check-circle' }} me-2"></i>
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('admin_login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"
                            style="border-radius: 12px 0 0 12px; border-color: #eef0f2;">
                            <i class="fas fa-user-shield text-muted small"></i>
                        </span>
                        <input type="text" name="username" class="form-control border-start-0 ps-0"
                            placeholder="Admin identifier" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Secure Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"
                            style="border-radius: 12px 0 0 12px; border-color: #eef0f2;">
                            <i class="fas fa-lock text-muted small"></i>
                        </span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0"
                            placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 shadow-sm">
                    Unlock Dashboard <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4 pt-2">
                <a href="{{ url_for('index') }}" class="text-decoration-none text-muted small hover-primary transition">
                    <i class="fas fa-home me-1"></i> Return to Main Site
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
